<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AWC Publications — Online publication viewer">
  <title>AWC Publications — Online Viewer</title>
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/styles.css?v=5" rel="stylesheet">
</head>
<body>
  <div id="linkProofingBanner" class="link-proofing-banner d-none" role="status">Link proofing mode</div>
  <div id="app" class="viewer-app">
    <!-- Top Toolbar -->
    <header class="viewer-toolbar" role="banner">
      <div class="toolbar-section toolbar-left">
        <button type="button" class="btn-toolbar" id="btnToggleThumbnails" aria-label="Menu / Hide Thumbnails" title="Menu / Hide Thumbnails">
          <i class="bi bi-list" aria-hidden="true"></i>
        </button>
        <h1 class="toolbar-title">AWC Publications</h1>
      </div>

      <div class="toolbar-section toolbar-center d-none d-md-flex">
        <button type="button" class="btn-toolbar" id="btnPrevPage" aria-label="Previous page" title="Previous page">
          <i class="bi bi-chevron-left" aria-hidden="true"></i>
        </button>
        <button type="button" class="btn-toolbar" id="btnNextPage" aria-label="Next page" title="Next page">
          <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </button>
        <div class="page-input-group">
          <label class="visually-hidden" for="pageInput">Current page</label>
          <input type="number" class="form-control page-input" id="pageInput" aria-label="Current page" min="1" value="1">
          <span class="page-total" id="pageTotal">/ —</span>
        </div>
        <div class="toolbar-divider" aria-hidden="true"></div>
        <button type="button" class="btn-toolbar" id="btnFirstPage" aria-label="First page" title="First Page">
          <i class="bi bi-house" aria-hidden="true"></i>
        </button>
        <button type="button" class="btn-toolbar" id="btnSectionTop" aria-label="Section top" title="Section Top">
          <i class="bi bi-bookmark" aria-hidden="true"></i>
        </button>
        <button type="button" class="btn-toolbar" id="btnNextSection" aria-label="Next section" title="Next Section">
          <i class="bi bi-skip-end" aria-hidden="true"></i>
        </button>
        <div class="toolbar-divider" aria-hidden="true"></div>
        <button type="button" class="btn-toolbar" id="btnZoomOut" aria-label="Zoom out" title="Zoom out">
          <i class="bi bi-dash-lg" aria-hidden="true"></i>
        </button>
        <span class="zoom-display" id="zoomDisplay" aria-live="polite">100%</span>
        <button type="button" class="btn-toolbar" id="btnZoomIn" aria-label="Zoom in" title="Zoom in">
          <i class="bi bi-plus-lg" aria-hidden="true"></i>
        </button>
        <div class="toolbar-divider" aria-hidden="true"></div>
        <div class="dropdown">
          <button type="button" class="btn-toolbar btn-toolbar-text dropdown-toggle" id="btnFitMenu" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Fit width options">
            <span id="fitModeLabel">Fit Width</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-dark viewer-dropdown" aria-labelledby="btnFitMenu">
            <li><button type="button" class="dropdown-item" data-fit="fitWidth">Fit Width</button></li>
            <li><button type="button" class="dropdown-item" data-fit="fitPage">Fit Page</button></li>
            <li><button type="button" class="dropdown-item" data-fit="actual">Actual Size (1:1)</button></li>
          </ul>
        </div>
        <button type="button" class="btn-toolbar" id="btnActualSize" aria-label="Actual size" title="Actual Size (1:1)">
          <span class="actual-size-label">1:1</span>
        </button>
      </div>

      <div class="toolbar-section toolbar-right">
        <button type="button" class="btn-toolbar" id="btnThemeToggle" aria-label="Toggle light/dark theme" title="Toggle theme">
          <i class="bi bi-sun-fill theme-icon-light" aria-hidden="true"></i>
          <i class="bi bi-moon-fill theme-icon-dark d-none" aria-hidden="true"></i>
        </button>
        <button type="button" class="btn-toolbar" id="btnSearch" aria-label="Search table of contents" title="Search table of contents">
          <i class="bi bi-search" aria-hidden="true"></i>
        </button>
        <button type="button" class="btn-toolbar btn-bookmark-toggle active" id="btnToggleBookmarks" aria-label="Toggle bookmarks panel" title="Table of Contents" aria-pressed="true">
          <i class="bi bi-bookmark-fill" aria-hidden="true"></i>
        </button>
        <div class="dropdown">
          <button type="button" class="btn-toolbar" id="btnMoreMenu" data-bs-toggle="dropdown" aria-expanded="false" aria-label="More options">
            <i class="bi bi-three-dots-vertical" aria-hidden="true"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end viewer-dropdown" aria-labelledby="btnMoreMenu">
            <li><h6 class="dropdown-header">Appearance</h6></li>
            <li>
              <button type="button" class="dropdown-item" data-theme-choice="light">
                <i class="bi bi-sun me-2" aria-hidden="true"></i>Light theme
              </button>
            </li>
            <li>
              <button type="button" class="dropdown-item" data-theme-choice="dark">
                <i class="bi bi-moon me-2" aria-hidden="true"></i>Dark theme
              </button>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <button type="button" class="dropdown-item" id="menuToggleThumbnails">
                <i class="bi bi-layout-sidebar me-2" aria-hidden="true"></i>Toggle thumbnails
              </button>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <!-- Mobile secondary toolbar -->
    <div class="mobile-toolbar d-md-none" role="toolbar" aria-label="Page navigation">
      <button type="button" class="btn-toolbar" id="btnFirstPageMobile" aria-label="First page" title="First Page">
        <i class="bi bi-house" aria-hidden="true"></i>
      </button>
      <button type="button" class="btn-toolbar" id="btnSectionTopMobile" aria-label="Section top" title="Section Top">
        <i class="bi bi-bookmark" aria-hidden="true"></i>
      </button>
      <button type="button" class="btn-toolbar" id="btnPrevPageMobile" aria-label="Previous page">
        <i class="bi bi-chevron-left" aria-hidden="true"></i>
      </button>
      <div class="page-input-group">
        <label class="visually-hidden" for="pageInputMobile">Current page</label>
        <input type="number" class="form-control page-input" id="pageInputMobile" aria-label="Current page" min="1" value="1">
        <span class="page-total" id="pageTotalMobile">/ —</span>
      </div>
      <button type="button" class="btn-toolbar" id="btnNextPageMobile" aria-label="Next page">
        <i class="bi bi-chevron-right" aria-hidden="true"></i>
      </button>
      <button type="button" class="btn-toolbar" id="btnNextSectionMobile" aria-label="Next section" title="Next Section">
        <i class="bi bi-skip-end" aria-hidden="true"></i>
      </button>
    </div>

    <!-- Main body -->
    <div class="viewer-body">
      <!-- Thumbnail rail -->
      <aside class="thumbnail-rail" id="thumbnailRail" aria-label="Page thumbnails">
        <div class="thumbnail-rail-inner" id="thumbnailContainer"></div>
      </aside>

      <!-- Reading pane -->
      <main class="reading-pane" id="readingPane" role="main">
        <div class="reading-pane-inner">
          <button type="button" class="floating-nav floating-nav-prev d-none d-lg-flex" id="btnFloatPrev" aria-label="Previous page">
            <i class="bi bi-chevron-left" aria-hidden="true"></i>
          </button>

          <div class="page-stream-wrap">
            <div class="page-stream-loading" id="pageStreamLoading" aria-live="polite">
              <div class="spinner-border spinner-accent" role="status">
                <span class="visually-hidden">Loading document…</span>
              </div>
            </div>
            <div class="page-stream zoom-fit-width" id="pageStream" aria-label="Document pages"></div>
          </div>

          <button type="button" class="floating-nav floating-nav-next d-none d-lg-flex" id="btnFloatNext" aria-label="Next page">
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
          </button>
        </div>
      </main>

      <!-- Desktop bookmark panel -->
      <aside class="bookmark-panel" id="bookmarkPanel" aria-label="Table of Contents">
        <div class="bookmark-panel-header">
          <h2 class="bookmark-panel-title">Table of Contents</h2>
          <button type="button" class="btn-panel-close" id="btnCloseBookmarks" aria-label="Close table of contents">
            <i class="bi bi-x-lg" aria-hidden="true"></i>
          </button>
        </div>
        <div class="bookmark-search-wrap">
          <label class="visually-hidden" for="bookmarkSearch">Filter table of contents</label>
          <i class="bi bi-search bookmark-search-icon" aria-hidden="true"></i>
          <input type="search" class="bookmark-search-input" id="bookmarkSearch" placeholder="Filter sections…" autocomplete="off" spellcheck="false">
        </div>
        <div class="bookmark-tree" id="bookmarkTreeDesktop" role="tree" aria-label="Document outline"></div>
      </aside>
    </div>

    <!-- Mobile bottom toolbar -->
    <div class="mobile-bottom-toolbar d-md-none" role="toolbar" aria-label="Zoom controls">
      <button type="button" class="btn-toolbar" id="btnZoomOutMobile" aria-label="Zoom out">
        <i class="bi bi-dash-lg" aria-hidden="true"></i>
      </button>
      <span class="zoom-display" id="zoomDisplayMobile">100%</span>
      <button type="button" class="btn-toolbar" id="btnZoomInMobile" aria-label="Zoom in">
        <i class="bi bi-plus-lg" aria-hidden="true"></i>
      </button>
      <button type="button" class="btn-toolbar" id="btnFitWidthMobile" aria-label="Fit width">
        <i class="bi bi-arrows-angle-expand" aria-hidden="true"></i>
      </button>
    </div>

    <!-- Mobile bookmark offcanvas -->
    <div class="offcanvas offcanvas-end bookmark-offcanvas" tabindex="-1" id="bookmarkOffcanvas" aria-labelledby="bookmarkOffcanvasLabel">
      <div class="offcanvas-header">
        <h2 class="offcanvas-title" id="bookmarkOffcanvasLabel">Table of Contents</h2>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body p-0">
        <div class="bookmark-search-wrap bookmark-search-wrap-mobile">
          <label class="visually-hidden" for="bookmarkSearchMobile">Filter table of contents</label>
          <i class="bi bi-search bookmark-search-icon" aria-hidden="true"></i>
          <input type="search" class="bookmark-search-input" id="bookmarkSearchMobile" placeholder="Filter sections…" autocomplete="off" spellcheck="false">
        </div>
        <div class="bookmark-tree" id="bookmarkTreeMobile" role="tree" aria-label="Document outline"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="assets/js/app.js?v=4"></script>
</body>
</html>
